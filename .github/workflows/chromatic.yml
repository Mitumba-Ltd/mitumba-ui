name: Visual Regression (Chromatic)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
on: 
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Publish to Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: .
          storybookBuildDir: apps/storybook/storybook-static
          buildScriptName: build # Using the build script we just added to apps/storybook
